<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1320" font-family="Inter, -apple-system, sans-serif">
  <rect width="900" height="1320" fill="#0f172a"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700">Autoloop — System Flowchart</text>
  <text x="450" y="62" text-anchor="middle" fill="#64748b" font-size="13">AI-powered cold outreach sequence optimizer for Heymarket</text>

  <!-- ── COLUMN LABELS ── -->
  <text x="160" y="100" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">USER / UI</text>
  <text x="450" y="100" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">OPTIMIZER (optimize.py)</text>
  <text x="740" y="100" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">CLAUDE API</text>

  <!-- column dividers -->
  <line x1="305" y1="85" x2="305" y2="1290" stroke="#1e293b" stroke-width="1"/>
  <line x1="595" y1="85" x2="595" y2="1290" stroke="#1e293b" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 1: New Vertical -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Box: New Vertical -->
  <rect x="50" y="115" width="220" height="54" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="138" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">New Vertical page</text>
  <text x="160" y="155" text-anchor="middle" fill="#64748b" font-size="11">Fill ICP form (industry, personas,</text>
  <text x="160" y="168" text-anchor="middle" fill="#64748b" font-size="11">tech stack, use cases…)</text>

  <!-- Arrow right -->
  <line x1="270" y1="142" x2="340" y2="142" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="305" y="136" text-anchor="middle" fill="#3b82f6" font-size="10">--derive</text>

  <!-- Box: Derive -->
  <rect x="340" y="115" width="220" height="54" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="136" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">optimize.py --derive</text>
  <text x="450" y="153" text-anchor="middle" fill="#64748b" font-size="11">Build system prompt from ICP</text>
  <text x="450" y="168" text-anchor="middle" fill="#64748b" font-size="11">+ program.md rules</text>

  <!-- Arrow right -->
  <line x1="560" y1="142" x2="630" y2="142" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="595" y="136" text-anchor="middle" fill="#6366f1" font-size="10">prompt</text>

  <!-- Box: Claude Derive -->
  <rect x="630" y="115" width="220" height="54" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="740" y="136" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Claude API</text>
  <text x="740" y="153" text-anchor="middle" fill="#64748b" font-size="11">Generate persona file +</text>
  <text x="740" y="168" text-anchor="middle" fill="#64748b" font-size="11">pain angle search space</text>

  <!-- Arrow back left: writes files -->
  <line x1="630" y1="155" x2="560" y2="155" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple2)"/>
  <text x="595" y="169" text-anchor="middle" fill="#8b5cf6" font-size="10">persona.md</text>

  <!-- Arrow down from derive box -->
  <line x1="450" y1="169" x2="450" y2="199" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Box: Files Written -->
  <rect x="340" y="199" width="220" height="50" rx="8" fill="#0f2d1e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="218" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">Files Written to Disk</text>
  <text x="450" y="235" text-anchor="middle" fill="#64748b" font-size="11">verticals/{v}/icp.md</text>
  <text x="450" y="249" text-anchor="middle" fill="#64748b" font-size="11">verticals/{v}/personas/{p}.md</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 2: Run Sequence -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Arrow down in UI column -->
  <line x1="160" y1="169" x2="160" y2="305" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Box: Run Sequence UI -->
  <rect x="50" y="305" width="220" height="64" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="326" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">Run Sequence page</text>
  <text x="160" y="343" text-anchor="middle" fill="#64748b" font-size="11">Choose vertical + persona</text>
  <text x="160" y="358" text-anchor="middle" fill="#64748b" font-size="11">Set iterations (1–10) + touches (1–8)</text>

  <!-- Arrow right -->
  <line x1="270" y1="337" x2="340" y2="337" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="305" y="330" text-anchor="middle" fill="#3b82f6" font-size="10">▶ Start</text>

  <!-- Box: Load Context -->
  <rect x="340" y="305" width="220" height="64" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="325" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">Load Context</text>
  <text x="450" y="342" text-anchor="middle" fill="#64748b" font-size="11">program.md + product_knowledge.md</text>
  <text x="450" y="357" text-anchor="middle" fill="#64748b" font-size="11">+ proof_bank.md + persona.md</text>
  <text x="450" y="369" text-anchor="middle" fill="#64748b" font-size="11">+ learnings (if prior run exists)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 3: Touch Loop -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Arrow down -->
  <line x1="450" y1="369" x2="450" y2="415" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Loop container -->
  <rect x="315" y="415" width="570" height="570" rx="10" fill="#0c1420" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="600" y="436" text-anchor="middle" fill="#475569" font-size="11" font-weight="600">LOOP: for each touch T1–T8  ×  N iterations</text>

  <!-- Box: Generate 3 Variants -->
  <rect x="340" y="448" width="220" height="60" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="468" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">Generate 3 Variants</text>
  <text x="450" y="485" text-anchor="middle" fill="#64748b" font-size="11">Prompt: rules digest + persona +</text>
  <text x="450" y="498" text-anchor="middle" fill="#64748b" font-size="11">arc + pain angle + prior learnings</text>

  <!-- Arrow right to Claude -->
  <line x1="560" y1="478" x2="630" y2="478" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Box: Claude gen -->
  <rect x="630" y="448" width="220" height="60" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="740" y="468" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Claude API</text>
  <text x="740" y="485" text-anchor="middle" fill="#64748b" font-size="11">Returns variant_a, variant_b,</text>
  <text x="740" y="498" text-anchor="middle" fill="#64748b" font-size="11">variant_c  (subject + body)</text>

  <!-- Arrow down in optimizer column -->
  <line x1="450" y1="508" x2="450" y2="548" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Box: Validate -->
  <rect x="340" y="548" width="220" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="568" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">Code Validation</text>
  <text x="450" y="585" text-anchor="middle" fill="#64748b" font-size="11">Word count ≤100 · forbidden phrases</text>
  <text x="450" y="598" text-anchor="middle" fill="#64748b" font-size="11">subject format · CTA rules</text>

  <!-- Diamond: pass? -->
  <polygon points="450,628 490,648 450,668 410,648" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="652" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">pass?</text>

  <!-- fail arrow loops back -->
  <path d="M410,648 Q330,648 330,510 Q330,448 340,448" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>
  <text x="318" y="548" fill="#ef4444" font-size="10" text-anchor="middle">retry</text>

  <!-- pass arrow down -->
  <line x1="450" y1="668" x2="450" y2="708" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Box: Score variants -->
  <rect x="340" y="708" width="220" height="60" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="728" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">Score Variants</text>
  <text x="450" y="745" text-anchor="middle" fill="#64748b" font-size="11">Send all 3 to Claude for rubric</text>
  <text x="450" y="758" text-anchor="middle" fill="#64748b" font-size="11">scoring (hook/relevance/proof…)</text>

  <!-- Arrow right to Claude -->
  <line x1="560" y1="738" x2="630" y2="738" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Box: Claude score -->
  <rect x="630" y="708" width="220" height="60" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="740" y="728" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Claude API</text>
  <text x="740" y="745" text-anchor="middle" fill="#64748b" font-size="11">Score each criterion 1–10</text>
  <text x="740" y="758" text-anchor="middle" fill="#64748b" font-size="11">Pick winner + weakest criterion</text>

  <!-- Arrow down -->
  <line x1="450" y1="768" x2="450" y2="808" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Box: Best candidate -->
  <rect x="340" y="808" width="220" height="50" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="828" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">Track Best Candidate</text>
  <text x="450" y="845" text-anchor="middle" fill="#64748b" font-size="11">Keep highest-score winner per touch</text>
  <text x="450" y="858" text-anchor="middle" fill="#64748b" font-size="11">across all N iterations</text>

  <!-- Loop-back arrow: next iteration -->
  <path d="M560,833 Q610,833 610,468 Q610,448 560,448" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-gray)"/>
  <text x="630" y="650" fill="#475569" font-size="10" text-anchor="middle">next iter</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 4: After loop -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <line x1="450" y1="985" x2="450" y2="1025" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Box: Distill Learnings -->
  <rect x="340" y="1025" width="220" height="54" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="450" y="1045" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="600">Distill Learnings</text>
  <text x="450" y="1062" text-anchor="middle" fill="#64748b" font-size="11">Claude summarises what worked</text>
  <text x="450" y="1075" text-anchor="middle" fill="#64748b" font-size="11">→ saved to learnings_{p}.md</text>

  <!-- Arrow right to Claude -->
  <line x1="560" y1="1052" x2="630" y2="1052" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Box: Claude learn -->
  <rect x="630" y="1025" width="220" height="54" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="740" y="1045" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Claude API</text>
  <text x="740" y="1062" text-anchor="middle" fill="#64748b" font-size="11">Produce structured learnings</text>
  <text x="740" y="1075" text-anchor="middle" fill="#64748b" font-size="11">(hooks, proof, tone patterns)</text>

  <!-- Arrow down -->
  <line x1="450" y1="1079" x2="450" y2="1115" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Box: Write sequence -->
  <rect x="340" y="1115" width="220" height="54" rx="8" fill="#0f2d1e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="1135" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">Write sequence_{p}.md</text>
  <text x="450" y="1152" text-anchor="middle" fill="#64748b" font-size="11">8 touches with scores, subjects,</text>
  <text x="450" y="1165" text-anchor="middle" fill="#64748b" font-size="11">bodies, rep notes</text>

  <!-- Arrow left to UI -->
  <line x1="340" y1="1142" x2="270" y2="1142" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green2)"/>

  <!-- Box: Dashboard / View -->
  <rect x="50" y="1115" width="220" height="54" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="1135" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">Dashboard / View Sequence</text>
  <text x="160" y="1152" text-anchor="middle" fill="#64748b" font-size="11">Browse touches · per-touch scores</text>
  <text x="160" y="1165" text-anchor="middle" fill="#64748b" font-size="11">Copy to clipboard · re-run</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- SHARED FILES SIDEBAR NOTE -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="50" y="680" width="220" height="140" rx="8" fill="#1a1a2e" stroke="#334155" stroke-width="1.5"/>
  <text x="160" y="700" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Shared Knowledge Files</text>
  <text x="160" y="718" text-anchor="middle" fill="#64748b" font-size="11">shared/program.md</text>
  <text x="160" y="732" text-anchor="middle" fill="#475569" font-size="10">8-touch schedule, scoring rubric,</text>
  <text x="160" y="745" text-anchor="middle" fill="#475569" font-size="10">arc rules, format constraints</text>
  <text x="160" y="762" text-anchor="middle" fill="#64748b" font-size="11">shared/proof_bank.md</text>
  <text x="160" y="776" text-anchor="middle" fill="#475569" font-size="10">Customer stats &amp; case studies</text>
  <text x="160" y="793" text-anchor="middle" fill="#64748b" font-size="11">shared/product_knowledge.md</text>
  <text x="160" y="807" text-anchor="middle" fill="#475569" font-size="10">Heymarket features &amp; wedges</text>

  <!-- dashed link from shared to optimizer -->
  <line x1="270" y1="750" x2="340" y2="750" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-gray)"/>
  <text x="305" y="744" text-anchor="middle" fill="#475569" font-size="9">injected</text>
  <text x="305" y="756" text-anchor="middle" fill="#475569" font-size="9">into prompt</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- SCORE LEGEND -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="50" y="860" width="220" height="110" rx="8" fill="#1a1a2e" stroke="#334155" stroke-width="1.5"/>
  <text x="160" y="880" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">Score Legend (per touch)</text>
  <text x="160" y="898" text-anchor="middle" fill="#64748b" font-size="11">6 criteria × 10 pts = 60 max</text>
  <rect x="65" y="906" width="10" height="10" rx="2" fill="#4ade80"/>
  <text x="82" y="917" fill="#64748b" font-size="10">≥ 45  Strong</text>
  <rect x="65" y="922" width="10" height="10" rx="2" fill="#fbbf24"/>
  <text x="82" y="932" fill="#64748b" font-size="10">40–44  Acceptable</text>
  <rect x="65" y="938" width="10" height="10" rx="2" fill="#f87171"/>
  <text x="82" y="948" fill="#64748b" font-size="10">≤ 39  Needs improvement</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ARROW MARKERS -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6366f1"/>
    </marker>
    <marker id="arrow-purple2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-green2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
